<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPOSTOR - Juego Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md p-6">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black text-red-600 tracking-tighter uppercase italic">Impostor</h1>
            <p id="status-label" class="text-slate-400 text-sm mt-2 font-medium">Conectando...</p>
        </header>

        <div id="setup-screen" class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Tu Nombre</label>
            <input type="text" id="username" placeholder="Ej: Lorenzo" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-600 mb-6 outline-none focus:border-red-500 transition-all text-lg text-white">
            <button id="btn-unirse" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-black text-white shadow-lg transition-all active:scale-95">ENTRAR</button>
        </div>

        <div id="game-screen" class="hidden space-y-4">
            <div id="role-card" class="bg-slate-800 p-5 rounded-2xl border-l-8 border-blue-500 shadow-xl">
                <span class="text-[10px] uppercase font-black text-slate-500 tracking-widest">Tu Secreto</span>
                <p id="secret-word" class="text-2xl font-bold text-blue-400 mt-1">Esperando inicio...</p>
            </div>

            <div class="bg-slate-800 rounded-2xl p-4 shadow-2xl border border-slate-700">
                <div id="chat-box" class="h-80 overflow-y-auto mb-4 p-2 text-sm flex flex-col gap-2"></div>
                <div class="flex gap-2">
                    <input type="text" id="msg-input" disabled placeholder="No es tu turno" class="flex-1 p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none text-white">
                    <button id="btn-send" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold">></button>
                </div>
            </div>
            
            <button id="btn-admin-start" class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-black hidden">INICIAR PARTIDA</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://impostor-c7956-default-rtdb.asia-southeast1.firebasedatabase.app",
            apiKey: "AIzaSyAyqIP1CjmXnYBVXBXseTe-iN_RkwN-ED4",
            authDomain: "impostor-c7956.firebaseapp.com",
            projectId: "impostor-c7956",
            storageBucket: "impostor-c7956.firebasestorage.app",
            messagingSenderId: "610688449274",
            appId: "1:610688449274:web:909e18e92ed45d61e4a743"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let miNombre = "";

        // Verificar conexión
        onValue(ref(db, '.info/connected'), (snap) => {
            document.getElementById('status-label').innerText = snap.val() ? "Conectado" : "Buscando señal...";
        });

        document.getElementById('btn-unirse').onclick = async () => {
            miNombre = document.getElementById('username').value.trim();
            if(!miNombre) return alert("Escribe tu nombre");

            try {
                const snap = await get(ref(db, 'jugadores'));
                if (!snap.exists()) {
                    await remove(ref(db, 'partida'));
                    await remove(ref(db, 'chat'));
                    document.getElementById('btn-admin-start').classList.remove('hidden');
                }

                await set(ref(db, 'jugadores/' + miNombre), { n: miNombre });
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
            } catch (e) {
                alert("Error: Revisa las reglas en Firebase");
            }
        };

        document.getElementById('btn-admin-start').onclick = async () => {
            const s = await get(ref(db, 'jugadores'));
            const lista = Object.keys(s.val() || {});
            if(lista.length < 2) return alert("Faltan jugadores");

            const palabras = ["PIZZA", "HAMBURGUESA", "FÚTBOL", "PLAYA", "CINE"];
            const imp = lista[Math.floor(Math.random() * lista.length)];
            const pal = palabras[Math.floor(Math.random() * palabras.length)];

            await remove(ref(db, 'chat'));
            await set(ref(db, 'partida'), {
                impostor: imp,
                palabra: pal,
                estado: 'jugando',
                turnoActual: lista[0],
                ronda: 1
            });
        };

        onValue(ref(db, 'partida'), (s) => {
            const data = s.val();
            if(!data) return;
            const input = document.getElementById('msg-input');
            const secret = document.getElementById('secret-word');

            if(data.estado === 'jugando') {
                secret.innerText = (miNombre === data.impostor) ? "ERES EL IMPOSTOR" : "Palabra: " + data.palabra;
                secret.style.color = (miNombre === data.impostor) ? "#ef4444" : "#60a5fa";
                document.getElementById('status-label').innerText = `Turno de: ${data.turnoActual}`;
                input.disabled = (miNombre !== data.turnoActual);
                input.placeholder = (miNombre === data.turnoActual) ? "¡Tu turno!" : `Esperando a ${data.turnoActual}...`;
            }
        });

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || input.disabled) return;

            await push(ref(db, 'chat'), { n: miNombre, t: input.value });
            input.value = "";

            const sP = await get(ref(db, 'partida'));
            const p = sP.val();
            const sJ = await get(ref(db, 'jugadores'));
            const lista = Object.keys(sJ.val());
            let nextIdx = (lista.indexOf(miNombre) + 1) % lista.length;
            let nRonda = p.ronda;
            if(nextIdx === 0) nRonda++;

            if(nRonda > 2) {
                set(ref(db, 'partida/estado'), 'votacion');
                set(ref(db, 'partida/turnoActual'), 'TODOS');
            } else {
                set(ref(db, 'partida/turnoActual'), lista[nextIdx]);
                set(ref(db, 'partida/ronda'), nRonda);
            }
        };

        onChildAdded(ref(db, 'chat'), (s) => {
            const d = s.val();
            const p = document.createElement('div');
            p.className = `p-2 rounded bg-slate-700/50`;
            p.innerHTML = `<b class="text-blue-400">${d.n}:</b> ${d.t}`;
            document.getElementById('chat-box').appendChild(p);
            document.getElementById('chat-box').scrollTop = 9999;
        });
    </script>
</body>
</html>
