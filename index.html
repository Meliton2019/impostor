<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-red-500 tracking-widest">IMPOSTOR</h1>
            <p id="status-label" class="text-slate-400">Esperando jugadores...</p>
        </header>

        <div id="setup-screen" class="bg-slate-800 p-6 rounded-lg shadow-xl">
            <input type="text" id="username" placeholder="Tu nombre" class="w-full p-2 rounded bg-slate-700 border border-slate-600 mb-4 focus:outline-none">
            <button id="btn-unirse" class="w-full bg-red-600 hover:bg-red-700 py-2 rounded font-bold transition">Unirse a Partida</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="bg-slate-800 p-4 rounded-lg mb-4 border-l-4 border-blue-500">
                <span class="text-xs uppercase text-slate-400">Tu secreto:</span>
                <p id="secret-word" class="text-xl font-bold text-blue-400 font-mono">Esperando inicio...</p>
            </div>

            <div class="bg-slate-800 rounded-lg p-4 shadow-xl">
                <div id="chat-box" class="h-64 overflow-y-auto mb-4 p-2 text-sm space-y-2 border-b border-slate-700"></div>
                <div class="flex gap-2">
                    <input type="text" id="msg-input" placeholder="Escribe algo..." class="flex-1 p-2 rounded bg-slate-700 border border-slate-600 outline-none">
                    <button id="btn-send" class="bg-blue-600 px-4 py-2 rounded font-bold">></button>
                </div>
            </div>
            
            <button id="btn-admin-start" class="w-full mt-4 bg-green-600 py-2 rounded font-bold hidden">Iniciar Partida (Admin)</button>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyqIP1CjmXnYBVXBXseTe-iN_RkwN-ED4",
        authDomain: "impostor-52364.firebaseapp.com",
        databaseURL: "https://impostor-52364-default-rtdb.firebaseio.com", // Asegúrate de que sea tu URL de Realtime Database
        projectId: "impostor-52364",
        storageBucket: "impostor-52364.firebasestorage.app",
        messagingSenderId: "610688449274",
        appId: "1:610688449274:web:909e18e92ed45d61e4a743"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let miNombre = "";
    let esAdmin = false;

    // --- UNIRSE A LA PARTIDA ---
    document.getElementById('btn-unirse').onclick = () => {
        miNombre = document.getElementById('username').value.trim();
        if(!miNombre) return alert("Escribe tu nombre");

        // Verificamos si somos el primer jugador para ser Admin
        onValue(ref(db, 'jugadores'), (snapshot) => {
            if (!snapshot.exists()) {
                esAdmin = true;
                document.getElementById('btn-admin-start').classList.remove('hidden');
                document.getElementById('status-label').innerText = "Eres el ADMIN (Jefe de sala)";
            }
        }, { onlyOnce: true });

        set(ref(db, 'jugadores/' + miNombre), { nombre: miNombre });
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
    };

    // --- INICIAR PARTIDA (Solo Admin) ---
    document.getElementById('btn-admin-start').onclick = () => {
        const palabras = ["CINE", "PLAYA", "HOSPITAL", "AVION", "SUPERMERCADO", "GIMNASIO"];
        
        onValue(ref(db, 'jugadores'), (snapshot) => {
            const jugadores = Object.keys(snapshot.val());
            if (jugadores.length < 3) return alert("Necesitas al menos 3 jugadores");

            const impostor = jugadores[Math.floor(Math.random() * jugadores.length)];
            const palabra = palabras[Math.floor(Math.random() * palabras.length)];

            // Resetear chat y empezar
            remove(ref(db, 'chat'));
            set(ref(db, 'partida'), {
                impostor: impostor,
                palabra: palabra,
                estado: 'jugando',
                turnoActual: jugadores[0],
                ronda: 1,
                contadorTurnos: 0
            });
        }, { onlyOnce: true });
    };

    // --- ESCUCHAR ESTADO, TURNOS Y RONDAS ---
    onValue(ref(db, 'partida'), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        const label = document.getElementById('status-label');
        const input = document.getElementById('msg-input');

        if(data.estado === 'jugando') {
            // Mostrar secreto
            if(miNombre === data.impostor) {
                document.getElementById('secret-word').innerText = "ERES EL IMPOSTOR (Adivina la palabra)";
                document.getElementById('secret-word').style.color = "#ef4444";
            } else {
                document.getElementById('secret-word').innerText = "Palabra: " + data.palabra;
                document.getElementById('secret-word').style.color = "#60a5fa";
            }

            // Control de turnos
            label.innerText = `Ronda ${data.ronda} - Turno de: ${data.turnoActual}`;
            input.disabled = (miNombre !== data.turnoActual);
            input.placeholder = (miNombre === data.turnoActual) ? "¡Te toca hablar!" : `Esperando a ${data.turnoActual}...`;
        } 
        
        if (data.estado === 'votacion') {
            label.innerText = "¡TIEMPO DE VOTACIÓN! Hablad en el chat y decidid.";
            input.disabled = false;
            input.placeholder = "Discutid quién es el impostor...";
        }
    });

    // --- ENVIAR MENSAJE Y PASAR TURNO ---
    document.getElementById('btn-send').onclick = () => {
        const msgInput = document.getElementById('msg-input');
        const msg = msgInput.value;
        if(!msg) return;

        onValue(ref(db, 'partida'), (snapshot) => {
            const data = snapshot.val();
            
            // Solo dejar enviar si es su turno o están en votación
            if (data.estado === 'jugando' && data.turnoActual !== miNombre) return;

            push(ref(db, 'chat'), { nombre: miNombre, texto: msg });
            msgInput.value = "";

            if (data.estado === 'jugando') {
                pasarTurno(data);
            }
        }, { onlyOnce: true });
    };

    function pasarTurno(data) {
        onValue(ref(db, 'jugadores'), (snapshot) => {
            const lista = Object.keys(snapshot.val());
            let indexActual = lista.indexOf(miNombre);
            let siguienteIndex = (indexActual + 1) % lista.length;
            let nuevaRonda = data.ronda;
            let nuevoContador = data.contadorTurnos + 1;

            // Si todos hablaron, sube la ronda
            if (siguienteIndex === 0) nuevaRonda++;

            // Si llegamos a la ronda 3 (después de 2 rondas), activar votación
            if (nuevaRonda > 2) {
                set(ref(db, 'partida/estado'), 'votacion');
            } else {
                set(ref(db, 'partida/turnoActual'), lista[siguienteIndex]);
                set(ref(db, 'partida/ronda'), nuevaRonda);
                set(ref(db, 'partida/contadorTurnos'), nuevoContador);
            }
        }, { onlyOnce: true });
    }

    onChildAdded(ref(db, 'chat'), (snapshot) => {
        const data = snapshot.val();
        const div = document.createElement('p');
        div.innerHTML = `<span class="text-blue-400 font-bold">${data.nombre}:</span> ${data.texto}`;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
