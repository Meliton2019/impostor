<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-red-500 tracking-widest">IMPOSTOR</h1>
            <p id="status-label" class="text-slate-400">Esperando jugadores...</p>
        </header>

        <div id="setup-screen" class="bg-slate-800 p-6 rounded-lg shadow-xl">
            <input type="text" id="username" placeholder="Tu nombre" class="w-full p-2 rounded bg-slate-700 border border-slate-600 mb-4 focus:outline-none">
            <button id="btn-unirse" class="w-full bg-red-600 hover:bg-red-700 py-2 rounded font-bold transition">Unirse a Partida</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="bg-slate-800 p-4 rounded-lg mb-4 border-l-4 border-blue-500">
                <span class="text-xs uppercase text-slate-400">Tu secreto:</span>
                <p id="secret-word" class="text-xl font-bold text-blue-400 font-mono">Esperando inicio...</p>
            </div>

            <div class="bg-slate-800 rounded-lg p-4 shadow-xl">
                <div id="chat-box" class="h-64 overflow-y-auto mb-4 p-2 text-sm space-y-2 border-b border-slate-700"></div>
                <div class="flex gap-2">
                    <input type="text" id="msg-input" placeholder="Escribe algo..." class="flex-1 p-2 rounded bg-slate-700 border border-slate-600 outline-none">
                    <button id="btn-send" class="bg-blue-600 px-4 py-2 rounded font-bold">></button>
                </div>
            </div>
            
            <button id="btn-admin-start" class="w-full mt-4 bg-green-600 py-2 rounded font-bold hidden">Iniciar Partida (Admin)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAyqIP1CjmXnYBVXBXseTe-iN_RkwN-ED4",
            authDomain: "impostor-52364.firebaseapp.com",
            projectId: "impostor-52364",
            storageBucket: "impostor-52364.firebasestorage.app",
            messagingSenderId: "610688449274",
            appId: "1:610688449274:web:909e18e92ed45d61e4a743"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let miNombre = "";

        // --- UNIRSE A LA PARTIDA ---
        document.getElementById('btn-unirse').onclick = () => {
            miNombre = document.getElementById('username').value;
            if(!miNombre) return alert("Escribe tu nombre");

            // Guardar jugador en la base de datos
            set(ref(db, 'jugadores/' + miNombre), { nombre: miNombre });
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('btn-admin-start').classList.remove('hidden'); // Para pruebas, todos pueden iniciar
        };

        // --- LÓGICA DE INICIO (Elegir Impostor) ---
        document.getElementById('btn-admin-start').onclick = () => {
            onValue(ref(db, 'jugadores'), (snapshot) => {
                const lista = Object.keys(snapshot.val());
                const impostor = lista[Math.floor(Math.random() * lista.length)];
                const palabra = "PIZZA"; // Aquí podrías poner una lista aleatoria

                set(ref(db, 'partida'), {
                    impostor: impostor,
                    palabra: palabra,
                    estado: 'jugando'
                });
            }, { onlyOnce: true });
        };

        // --- ESCUCHAR ESTADO DEL JUEGO ---
        onValue(ref(db, 'partida'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            if(data.estado === 'jugando') {
                if(miNombre === data.impostor) {
                    document.getElementById('secret-word').innerText = "ERES EL IMPOSTOR";
                    document.getElementById('secret-word').classList.replace('text-blue-400', 'text-red-500');
                } else {
                    document.getElementById('secret-word').innerText = "Palabra: " + data.palabra;
                }
            }
        });

        // --- CHAT ---
        document.getElementById('btn-send').onclick = () => {
            const msg = document.getElementById('msg-input').value;
            if(!msg) return;
            push(ref(db, 'chat'), { nombre: miNombre, texto: msg });
            document.getElementById('msg-input').value = "";
        };

        onChildAdded(ref(db, 'chat'), (snapshot) => {
            const data = snapshot.val();
            const div = document.createElement('p');
            div.innerHTML = `<strong>${data.nombre}:</strong> ${data.texto}`;
            document.getElementById('chat-box').appendChild(div);
        });
    </script>
</body>
</html>
