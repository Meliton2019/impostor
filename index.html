<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #chat-box p { margin-bottom: 4px; padding: 4px; border-radius: 4px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-red-500 tracking-widest uppercase">Impostor</h1>
            <p id="status-label" class="text-slate-400 text-sm mt-2">Introduce tu nombre para entrar</p>
        </header>

        <div id="setup-screen" class="bg-slate-800 p-6 rounded-lg shadow-xl">
            <input type="text" id="username" placeholder="Tu nombre..." class="w-full p-3 rounded bg-slate-700 border border-slate-600 mb-4 focus:outline-none focus:border-red-500">
            <button id="btn-unirse" class="w-full bg-red-600 hover:bg-red-700 py-3 rounded font-bold transition">ENTRAR A LA SALA</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="role-card" class="bg-slate-800 p-4 rounded-lg mb-4 border-l-4 border-blue-500">
                <span class="text-xs uppercase text-slate-400">Tu información:</span>
                <p id="secret-word" class="text-xl font-bold text-blue-400 font-mono">Esperando al administrador...</p>
            </div>

            <div class="bg-slate-800 rounded-lg p-4 shadow-xl">
                <div id="chat-box" class="h-64 overflow-y-auto mb-4 p-2 text-sm border-b border-slate-700"></div>
                <div class="flex gap-2">
                    <input type="text" id="msg-input" disabled placeholder="Esperando inicio..." class="flex-1 p-2 rounded bg-slate-700 border border-slate-600 outline-none">
                    <button id="btn-send" class="bg-blue-600 px-4 py-2 rounded font-bold disabled:opacity-50">></button>
                </div>
            </div>
            
            <button id="btn-admin-start" class="w-full mt-4 bg-green-600 hover:bg-green-700 py-3 rounded font-bold hidden shadow-lg">INICIAR PARTIDA</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAyqIP1CjmXnYBVXBXseTe-iN_RkwN-ED4",
            authDomain: "impostor-52364.firebaseapp.com",
            databaseURL: "https://impostor-52364-default-rtdb.firebaseio.com",
            projectId: "impostor-52364",
            storageBucket: "impostor-52364.firebasestorage.app",
            messagingSenderId: "610688449274",
            appId: "1:610688449274:web:909e18e92ed45d61e4a743"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let miNombre = "";

        // --- UNIRSE ---
        document.getElementById('btn-unirse').onclick = async () => {
            const input = document.getElementById('username');
            miNombre = input.value.trim();
            if(!miNombre) return alert("Escribe un nombre");

            // Comprobar si somos el primero
            const snapshot = await get(ref(db, 'jugadores'));
            if (!snapshot.exists()) {
                document.getElementById('btn-admin-start').classList.remove('hidden');
                document.getElementById('status-label').innerText = "Eres el administrador";
            } else {
                document.getElementById('status-label').innerText = "Conectado como: " + miNombre;
            }

            await set(ref(db, 'jugadores/' + miNombre), { nombre: miNombre });
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        };

        // --- INICIAR (Solo Admin) ---
        document.getElementById('btn-admin-start').onclick = async () => {
            const snap = await get(ref(db, 'jugadores'));
            const jugadores = Object.keys(snap.val() || {});
            
            if (jugadores.length < 2) return alert("Se necesitan al menos 2 personas (aunque mejor 3)");

            const palabras = ["CINE", "PLAYA", "HOSPITAL", "ZOO", "BOSQUE", "COLEGIO"];
            const impostor = jugadores[Math.floor(Math.random() * jugadores.length)];
            const palabra = palabras[Math.floor(Math.random() * palabras.length)];

            await remove(ref(db, 'chat'));
            await set(ref(db, 'partida'), {
                impostor: impostor,
                palabra: palabra,
                estado: 'jugando',
                turnoActual: jugadores[0],
                ronda: 1
            });
        };

        // --- LÓGICA DE TURNOS Y ESTADO ---
        onValue(ref(db, 'partida'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            const label = document.getElementById('status-label');
            const input = document.getElementById('msg-input');
            const secret = document.getElementById('secret-word');

            if(data.estado === 'jugando') {
                // Rol
                if(miNombre === data.impostor) {
                    secret.innerText = "Eres el IMPOSTOR";
                    secret.className = "text-xl font-bold text-red-500 font-mono";
                } else {
                    secret.innerText = "Palabra: " + data.palabra;
                    secret.className = "text-xl font-bold text-blue-400 font-mono";
                }

                // Turnos
                label.innerText = `Ronda ${data.ronda} - Turno de: ${data.turnoActual}`;
                input.disabled = (miNombre !== data.turnoActual);
                input.placeholder = (miNombre === data.turnoActual) ? "¡Tu turno! Escribe tu pista..." : `Esperando a ${data.turnoActual}...`;
            }

            if(data.estado === 'votacion') {
                label.innerText = "¡TIEMPO DE VOTAR!";
                input.disabled = false;
                input.placeholder = "Discutid y votad...";
            }
        });

        // --- CHAT ---
        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if(!texto) return;

            const snapPartida = await get(ref(db, 'partida'));
            const partida = snapPartida.val();

            // Solo permitir si es tu turno
            if(partida.estado === 'jugando' && partida.turnoActual !== miNombre) return;

            await push(ref(db, 'chat'), { nombre: miNombre, texto: texto });
            input.value = "";

            if(partida.estado === 'jugando') {
                const snapJugadores = await get(ref(db, 'jugadores'));
                const lista = Object.keys(snapJugadores.val());
                let idx = lista.indexOf(miNombre);
                let proximoIdx = (idx + 1) % lista.length;
                let nuevaRonda = partida.ronda;

                if(proximoIdx === 0) nuevaRonda++;

                if(nuevaRonda > 2) {
                    set(ref(db, 'partida/estado'), 'votacion');
                } else {
                    set(ref(db, 'partida/turnoActual'), lista[proximoIdx]);
                    set(ref(db, 'partida/ronda'), nuevaRonda);
                }
            }
        };

        onChildAdded(ref(db, 'chat'), (snapshot) => {
            const data = snapshot.val();
            const p = document.createElement('p');
            p.innerHTML = `<b class="text-blue-300">${data.nombre}:</b> ${data.texto}`;
            const box = document.getElementById('chat-box');
            box.appendChild(p);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
