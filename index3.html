<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPOSTOR - Modo Supervivencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md p-6">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black text-red-600 tracking-tighter uppercase italic">Impostor</h1>
            <p id="status-label" class="text-slate-400 text-sm mt-2 font-medium font-mono">Conectando...</p>
        </header>

        <div id="setup-screen" class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
            <input type="text" id="username" placeholder="Tu Nombre" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-600 mb-6 outline-none focus:border-red-500 text-white text-lg">
            <button id="btn-unirse" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all">ENTRAR</button>
        </div>

        <div id="game-screen" class="hidden space-y-4">
            <div id="role-card" class="bg-slate-800 p-5 rounded-2xl border-l-8 border-blue-500 shadow-xl">
                <span id="role-title" class="text-[10px] uppercase font-black text-slate-500 tracking-widest">Tu Secreto</span>
                <p id="secret-word" class="text-2xl font-bold text-blue-400 mt-1 italic">Esperando inicio...</p>
            </div>
            <div class="bg-slate-800 rounded-2xl p-4 shadow-2xl border border-slate-700">
                <div id="chat-box" class="h-64 overflow-y-auto mb-4 p-2 text-sm flex flex-col gap-2"></div>
                <div class="flex gap-2">
                    <input type="text" id="msg-input" disabled class="flex-1 p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none text-white">
                    <button id="btn-send" class="bg-blue-600 px-6 py-3 rounded-xl font-bold">></button>
                </div>
            </div>
            <button id="btn-admin-start" class="w-full bg-emerald-600 py-4 rounded-xl font-black hidden">INICIAR PARTIDA</button>
        </div>

        <div id="vote-screen" class="hidden bg-slate-800 p-6 rounded-2xl shadow-2xl border-2 border-orange-500 text-center">
            <h2 class="text-2xl font-black mb-4 text-orange-500">¿QUIÉN ES EL IMPOSTOR?</h2>
            <p class="text-slate-400 text-xs mb-6 uppercase tracking-widest">Haz clic en un jugador para votar</p>
            <div id="vote-list" class="grid grid-cols-1 gap-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, remove, get, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://impostor-c7956-default-rtdb.asia-southeast1.firebasedatabase.app",
            apiKey: "AIzaSyAyqIP1CjmXnYBVXBXseTe-iN_RkwN-ED4",
            authDomain: "impostor-c7956.firebaseapp.com",
            projectId: "impostor-c7956",
            storageBucket: "impostor-c7956.firebasestorage.app",
            messagingSenderId: "610688449274",
            appId: "1:610688449274:web:909e18e92ed45d61e4a743"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let miNombre = "";
        let yaHeVotado = false;

        onValue(ref(db, '.info/connected'), s => { document.getElementById('status-label').innerText = s.val() ? "SALA ACTIVA" : "SIN CONEXIÓN"; });

        document.getElementById('btn-unirse').onclick = async () => {
            miNombre = document.getElementById('username').value.trim();
            if(!miNombre) return;
            const snap = await get(ref(db, 'jugadores'));
            if (!snap.exists()) {
                await set(ref(db, '/'), { jugadores: {}, partida: null, chat: null, votos: null });
                document.getElementById('btn-admin-start').classList.remove('hidden');
            }
            await set(ref(db, 'jugadores/' + miNombre), { n: miNombre });
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        };

        document.getElementById('btn-admin-start').onclick = async () => {
            const s = await get(ref(db, 'jugadores'));
            const lista = Object.keys(s.val() || {});
            if(lista.length < 2) return alert("Faltan jugadores");
            const palabras = ["PIZZA", "FÚTBOL", "PLAYA", "CINE", "HOSPITAL"];
            await remove(ref(db, 'chat'));
            await set(ref(db, 'partida'), {
                impostor: lista[Math.floor(Math.random() * lista.length)],
                palabra: palabras[Math.floor(Math.random() * palabras.length)],
                estado: 'jugando',
                turnoActual: lista[0],
                ronda: 1
            });
        };

        onValue(ref(db, 'partida'), (s) => {
            const data = s.val();
            if(!data) return;
            const input = document.getElementById('msg-input');
            const secret = document.getElementById('secret-word');

            // GESTIÓN DE PANTALLAS
            if(data.estado === 'jugando') {
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('vote-screen').classList.add('hidden');
                secret.innerText = (miNombre === data.impostor) ? "¡ERES EL IMPOSTOR!" : "Palabra: " + data.palabra;
                secret.style.color = (miNombre === data.impostor) ? "#ef4444" : "#60a5fa";
                document.getElementById('status-label').innerText = `RONDA ${data.ronda} - TURNO: ${data.turnoActual}`;
                input.disabled = (miNombre !== data.turnoActual);
            } 
            
            if(data.estado === 'votacion') {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('vote-screen').classList.remove('hidden');
                generarListaVotos();
            }
        });

        async function generarListaVotos() {
            const container = document.getElementById('vote-list');
            container.innerHTML = "";
            const s = await get(ref(db, 'jugadores'));
            const lista = Object.keys(s.val() || {});
            lista.forEach(nombre => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-slate-700 p-4 rounded-xl font-bold hover:bg-orange-600 transition-all";
                btn.innerText = nombre;
                btn.onclick = () => votarA(nombre);
                container.appendChild(btn);
            });
        }

        async function votarA(alguien) {
            if(yaHeVotado) return;
            yaHeVotado = true;
            await update(ref(db, 'votos'), { [alguien]: increment(1) });
            
            // Lógica simple: El primero que vota espera a que el admin decida o el último ejecute
            // Para simplificar, el Admin (o el primero de la lista) procesa el resultado
            const sV = await get(ref(db, 'votos'));
            const sJ = await get(ref(db, 'jugadores'));
            const numVotos = Object.values(sV.val() || {}).reduce((a,b) => a+b, 0);
            const numJugadores = Object.keys(sJ.val()).length;

            if(numVotos >= numJugadores) {
                procesarResultado(sV.val());
            }
        }

        async function procesarResultado(votosRecibidos) {
            const expulsado = Object.keys(votosRecibidos).reduce((a, b) => votosRecibidos[a] > votosRecibidos[b] ? a : b);
            const sP = await get(ref(db, 'partida'));
            const partida = sP.val();

            if(expulsado === partida.impostor) {
                alert(`¡GANASTEIS! ${expulsado} era el Impostor.`);
                location.reload(); // Reiniciar app
            } else {
                alert(`¡FALLO! ${expulsado} era inocente. El juego sigue...`);
                await remove(ref(db, 'votos'));
                yaHeVotado = false;
                const sJ = await get(ref(db, 'jugadores'));
                const lista = Object.keys(sJ.val());
                await update(ref(db, 'partida'), { estado: 'jugando', ronda: 1, turnoActual: lista[0] });
            }
        }

        document.getElementById('btn-send').onclick = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() || input.disabled) return;
            await push(ref(db, 'chat'), { n: miNombre, t: input.value });
            input.value = "";
            const sP = await get(ref(db, 'partida'));
            const p = sP.val();
            const sJ = await get(ref(db, 'jugadores'));
            const lista = Object.keys(sJ.val());
            let nextIdx = (lista.indexOf(miNombre) + 1) % lista.length;
            let nRonda = p.ronda;
            if(nextIdx === 0) nRonda++;
            if(nRonda > 2) {
                await update(ref(db, 'partida'), { estado: 'votacion' });
            } else {
                await update(ref(db, 'partida'), { turnoActual: lista[nextIdx], ronda: nRonda });
            }
        };

        onChildAdded(ref(db, 'chat'), s => {
            const d = s.val();
            const p = document.createElement('div');
            p.className = `p-2 rounded bg-slate-700/50 ${d.n === miNombre ? 'border-r-4 border-blue-500 text-right' : 'border-l-4 border-slate-500'}`;
            p.innerHTML = `<b class="text-xs block opacity-50">${d.n}</b>${d.t}`;
            document.getElementById('chat-box').appendChild(p);
            document.getElementById('chat-box').scrollTop = 9999;
        });
    </script>
</body>
</html>
